# SpineHybridEfficient — Configuration
# =====================================

paths:
  preprocessed_dir : "/home/muhammadfaisal/Documents/Jenv/data/preprocessed"
  results_dir      : "/home/muhammadfaisal/Documents/Jenv/results/SpineHybridEfficient"
  dino_weights     : "/home/muhammadfaisal/Documents/Jenv/3DINO/weights/3dino_vit_weights.pth"
  dino_repo        : "/home/muhammadfaisal/Documents/Jenv/3DINO"

model:
  num_classes           : 26
  image_size            : 128
  dino_size             : 112      # fixed 3DINO pretraining size — never change
  unfreeze_last_n_blocks: 2        # 2 = best Dice | 0 = fully frozen

training:
  num_epochs    : 300
  batch_size    : 2
  learning_rate : 1.0e-4
  dino_lr_scale : 0.1              # DINO LR = learning_rate × dino_lr_scale
  weight_decay  : 5.0e-4
  warmup_epochs : 10
  grad_clip     : 1.0

scheduler:
  type   : "CosineAnnealingWarmRestarts"
  T_0    : 50
  T_mult : 1
  eta_min: 1.0e-6

loss:
  gdl_weight   : 0.3
  sdl_weight   : 0.3
  ce_weight    : 0.1
  focal_weight : 0.3
  focal_gamma  : 2.0
  focal_alpha  : 0.25

augmentation:
  flip_prob        : 0.5
  rotate_prob      : 0.7
  elastic_prob     : 0.7
  noise_prob       : 0.7
  noise_sigma      : 0.02
  scale_prob       : 0.6
  brightness_prob  : 0.7
  gamma_prob       : 0.7
  gamma_range      : [0.7, 1.5]
  blur_prob        : 0.7
  low_res_prob     : 0.8

inference:
  roi_size    : 128      # sliding window patch size = training size
  overlap     : 0.5      # Gaussian-weighted overlap
  infer_size  : 256      # full-resolution volume size for inference
